<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dev Portfolio Admin</title>
  <link rel="stylesheet" href="admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>Dev Portfolio Admin</h1>
    <p>Manage your projects: Add, Edit, Delete</p>
  </header>

  <!-- Add/Edit Form -->
  <section id="add-project">
    <form id="projectForm">
      <label for="title">Title</label>
      <input type="text" id="title" placeholder="Optional">

      <label for="description">Description</label>
      <textarea id="description" placeholder="Optional"></textarea>

      <label for="category">Category (comma-separated)</label>
      <input type="text" id="category" placeholder="Optional">

      <label for="tech">Tech Used (comma-separated)</label>
      <input type="text" id="tech" placeholder="Optional">

      <label for="demo">Demo URL</label>
      <input type="url" id="demo" placeholder="Optional">

      <label for="github">GitHub URL</label>
      <input type="url" id="github" placeholder="Optional">

      <label for="media">Media (image/video)</label>
      <input type="file" id="media" accept="image/*,video/*">

      <button type="submit" id="submitBtn">Add Project</button>
    </form>
  </section>

  <!-- Live Preview -->
  <section id="preview-section">
    <h2>Live Preview</h2>
    <div id="preview"></div>
  </section>

  <!-- Existing Projects -->
  <section id="projects-section">
    <h2>Existing Projects</h2>
    <div id="projects-list"></div>
  </section>

  <footer>
    &copy; 2026 Kae Davis • Admin Panel
  </footer>

  <script src="admin.js"></script>
</body>
</html>
