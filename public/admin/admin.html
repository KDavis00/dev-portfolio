<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dev Portfolio Admin</title>
  <link rel="stylesheet" href="admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1>Dev Portfolio Admin</h1>
  <p>Manage your projects: Add, Edit, Delete</p>
</header>

<section id="add-project">

  <label for="repoDropdown">GitHub Repositories</label>
  <select id="repoDropdown">
    <option value="">Loading repos...</option>
  </select>

  <form id="projectForm">

    <label for="title">Title</label>
    <input type="text" id="title">

    <label for="description">Description</label>
    <textarea id="description"></textarea>

    <label for="category">Category</label>
    <select id="categoryDropdown">
      <option value="">Select Category</option>
      <option value="WordPress">WordPress</option>
      <option value="Gadgets">Gadgets</option>
      <option value="Fun Stuff">Fun Stuff</option>
      <option value="Storefront">Storefront</option>
    </select>

    <div id="categoryBubbles" class="bubbles"></div>

    <label for="tech">Tech Used</label>
    <select id="techDropdown">
      <option value="">Select Tech</option>
      <option value="HTML">HTML</option>
      <option value="CSS">CSS</option>
      <option value="JavaScript">JavaScript</option>
      <option value="Node.js">Node.js</option>
      <option value="Express">Express</option>
      <option value="React">React</option>
      <option value="Python">Python</option>
      <option value="PHP">PHP</option>
      <option value="MySQL">MySQL</option>
      <option value="MongoDB">MongoDB</option>
      <option value="SQLite">SQLite</option>
      <option value="Firebase">Firebase</option>
      <option value="Bootstrap">Bootstrap</option>
      <option value="jQuery">jQuery</option>
    </select>

    <div id="techBubbles" class="bubbles"></div>

    <label for="demo">Demo URL</label>
    <input type="url" id="demo">

    <label for="github">GitHub URL</label>
    <input type="url" id="github">

    <label for="media">Media (image/video)</label>
    <input type="file" id="media" accept="image/*,video/*">

    <button type="submit" id="submitBtn">Add Project</button>

  </form>
</section>

<section id="preview-section">
  <h2>Live Preview</h2>
  <div id="preview"></div>
</section>

<section id="projects-section">
  <h2>Existing Projects</h2>
  <div id="projects-list"></div>
</section>

<footer>
  &copy; 2026 Kae Davis • Admin Panel
</footer>

<script src="admin.js"></script>

</body>
</html>
